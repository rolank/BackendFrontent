# Display name in GitHub Actions UI.
name: Backend Continuous Deployment to GCP Cloud Run

# Trigger deploy after backend CI completes on main, or manually.
on:
  workflow_run:
    # Upstream workflow name to watch.
    workflows: ["Blog Backend CI"]
    # Trigger when the upstream workflow finishes.
    types: [completed]
    # Only when that run is for main branch commits.
    branches: [main]
  # Manual trigger button in Actions tab.
  workflow_dispatch: {}

# Required token permissions for checkout + OIDC auth to GCP.
permissions:
  contents: read
  id-token: write

# Ensure only one production backend deploy runs at a time.
concurrency:
  group: backend-production
  cancel-in-progress: true

jobs:
  deploy:
    # Auto-deploy only on successful CI completion; manual dispatch always allowed.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy-to-cloud-run.outputs.url }}

    env:
      GCP_PROJECT_ID: "oidc-github-01"
      GCP_REGION: "us-central1"
      SERVICE_NAME: "blog-backend-service"
      IMAGE_NAME: "blog-backend"
      DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
      GCP_WIF_PROVIDER: "projects/1010347128743/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      GCP_WIF_SA: "cloudrun-deployer@oidc-github-01.iam.gserviceaccount.com"

    steps:
      #Step 1: Checkout the exact commit that triggered the CI workflow (if workflow_run), or the current commit (if manual).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          #ref tells actions/checkout exactly what Git ref (commit/branch/tag) to fetch and check out.
          #If triggered by workflow_run, use the exact commit SHA that the CI workflow ran on (workflow_run.head_sha).
          #Otherwise (like manual workflow_dispatch), use the current workflow commit SHA (github.sha)
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Step 2: Build a commit-tagged Docker image.
      - name: Build Docker Image
        id: build-image
        run: |
          set -euo pipefail
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE="${{secrets.DOCKERHUB_USERNAME}}/${IMAGE_NAME}:${COMMIT_SHA}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          docker build --platform linux/amd64 -t "$IMAGE" -f backend/Dockerfile backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Push the image to Docker Hub.
      - name: Push Docker Image
        run: |
          set -euo pipefail
          docker push "$IMAGE"

      # docker build → build an image
      # --platform linux/amd64 → target AMD64 architecture
      # -t "$IMAGE" → tag the built image with that name
      # -f backend/Dockerfile → use that specific Dockerfile
      # backend → send the backend/ directory as the build context.
      # The build context is the folder Docker sends to the daemon so COPY and ADD in the Dockerfile can access files from it.

      # Step 5: Secure OIDC handshake with GCP.
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      # Step 6: Deploy the previously built image to Cloud Run.
      - name: Deploy to Cloud Run
        id: deploy-to-cloud-run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.build-image.outputs.image }}

          # 1. ALLOW PUBLIC ACCESS TO THE ENDPOINT
          flags: "--allow-unauthenticated"

          # 2. NON-SENSITIVE ENVIRONMENT VARIABLES
          env_vars: |
            NODE_ENV=production
            JWT_EXPIRES_IN=${{ vars.JWT_EXPIRES_IN }}
            MONGO_DB_NAME=blog_prod_db

          # 3. CRYPTOGRAPHICALLY SECURE SECRETS (Mounted straight from GCP Secret Manager)
          # Syntax: APP_ENV_NAME=SECRET_NAME_IN_GCP:VERSION
          secrets: |
            DATABASE_URL=MONGODB_URI:latest
            JWT_SECRET=JWT_SECRET:latest
