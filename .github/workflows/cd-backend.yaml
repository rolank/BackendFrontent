name: Backend Continuous Deployment to GCP Cloud Run

on:
  workflow_run:
    workflows: ["Blog Backend CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-production
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy-to-cloud-run.outputs.url }}
    env:
      PROJECT_ID: oidc-gcp-roland-01
      PROJECT_NUMBER: "591006590099"
      REGION: us-central1
      REPOSITORY: blog
      IMAGE_NAME: blog-backend
      WIF_PROVIDER: "projects/591006590099/locations/global/workloadIdentityPools/my-github-pool/providers/my-github-provider"
      WIF_SA: cloudrun-deployer@oidc-gcp-roland-01.iam.gserviceaccount.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and Push Image to Artifact Registry
        run: |
          set -euo pipefail

          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE="us-central1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${COMMIT_SHA}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

          docker build \
            --platform linux/amd64 \
            -t "$IMAGE" \
            -f backend/Dockerfile \
            backend

          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        id: deploy-to-cloud-run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: blog-backend-service
          image: ${{ env.IMAGE }}
          region: ${{ env.REGION }}
          flags: "--allow-unauthenticated"
          env_vars: |
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
