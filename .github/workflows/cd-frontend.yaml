name: Continuous Deployment of Blog Frontend to Google Cloud Run
on:
  workflow_run:
    workflows: ["Continuous Integration of Blog Frontend on Google Cloud Run"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy-to-cloud-run.outputs.url }}

    env:
      GCP_PROJECT_ID: "oidc-github-01"
      GCP_REGION: "us-central1"
      SERVICE_NAME: "blog-frontend-service"
      IMAGE_NAME: "blog-frontend"
      GCP_WIF_PROVIDER: "projects/1010347128743/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      GCP_WIF_SA: "cloudrun-deployer@oidc-github-01.iam.gserviceaccount.com"
      GCP_RUNTIME_SA: "blog-backend-runtime@oidc-github-01.iam.gserviceaccount.com"
      VITE_BACKEND_URL: "https://blog-backend-service-1010347128743.us-central1.run.app/api/v1"

    steps:
      # Step 1: Checkout the exact commit that triggered the CI workflow (if workflow_run), or the current commit (if manual).
      - name: Checkout the exact commit that triggered the CI workflow
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Step 2: Build a commit-tagged Docker image.
      - name: Build Docker image
        id: build-image
        run: |
          set -euo pipefail
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${COMMIT_SHA}"        
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          docker build --platform linux/amd64 \
            --build-arg "VITE_BACKEND_URL=${{ env.VITE_BACKEND_URL }}" \
            -t "$IMAGE" -f Dockerfile .

      # Define and log in to Docker Hub using credentials stored in GitHub Secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Push the image to Docker Hub.
      - name: Push Docker image to Docker Hub
        run: |
          set -euo pipefail
          docker push "$IMAGE"

      # Step 5: Secure OIDC handshake with GCP.
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SA }}

      # Step 6: Deploy the previously built image to Cloud Run.
      - name: Deploy to Cloud Run
        id: deploy-to-cloud-run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.build-image.outputs.image }}

          flags: "--service-account=${{ env.GCP_RUNTIME_SA }}"
