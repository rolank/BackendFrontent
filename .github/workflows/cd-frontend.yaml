name: Frontend CD to Google Cloud Run
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-to-cloud-run.outputs.url }}

    env:
      PROJECT_ID: 'oidc-github-01'
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_LOR2P }}
      DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
      FRONTEND_IMAGE: blog-frontend
      PROJECT_NUMBER: "1010347128743"
      WIF_PROVIDER: "projects/1010347128743/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      WIF_SA: 'cloudrun-deployer@oidc-github-01.iam.gserviceaccount.com'

    steps:
      - uses: actions/checkout@v4
      # Define and log in to Docker Hub using credentials stored in GitHub Secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      # Authenticate to GCP using Workload Identity Federation
    