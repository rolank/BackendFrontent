name: Frontend CD to Google Cloud Run
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-to-cloud-run.outputs.url }}

    env:
      PROJECT_ID: 'oidc-github-01'
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_LOR2P }}
      DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
      FRONTEND_IMAGE: blog-frontend
      PROJECT_NUMBER: "1010347128743"
      WIF_PROVIDER: "projects/1010347128743/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      WIF_SA: 'cloudrun-deployer@oidc-github-01.iam.gserviceaccount.com'

    steps:
      - uses: actions/checkout@v4
      # Define and log in to Docker Hub using credentials stored in GitHub Secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      # Authenticate to GCP using Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}
      # Explicitly configure =s the environment to handle gcloud commands safely in the GitHub Actions runner context.
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
    
      # Build and Push Docker Image to Docker Hub
      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/amd64 \
          --build-arg "BUILD_ARG_BACKEND_URL=https://blog-backend-service-591006590099.us-central1.run.app/api/v1" \
          -t ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest -f ./Dockerfile .
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        id: deploy-to-cloud-run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: blog-frontend-service
          image: ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
          region: ${{ secrets.GOOGLECLOUD_REGION }}
          platform: managed
          allow_unauthenticated: true
